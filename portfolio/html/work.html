<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <link href="../css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
            background: #020617;
            color: white;
        }

        .navbar {
            background: #020617;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar a {
            color: #fff !important;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #9333ea !important;
        }

        section {
            background: #020617;
            color: white;
        }

        .bg-light {
            background: #020617 !important;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 30px;
            transition: 0.3s;
            color: #c084fc;
        }

        .section-title:hover {
            letter-spacing: 1px;
            color: #f7f7f7;
        }

        .card {
            transition: 0.3s;
            background: #0f172a;
            color: white;
            border: none;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 10px 25px #320163;
        }

        .card img {
            transition: 0.3s;
        }

        .btn-primary {
            background: #9333ea;
            border: none;
        }

        .btn-primary:hover {
            background: #7e22ce;
        }

        input,
        textarea {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
        }

        input::placeholder,
        textarea::placeholder {
            color: #94a3b8;
        }

        input:focus,
        textarea:focus {
            box-shadow: 0 0 10px #7e22ce;
            border-color: #9333ea;
        }

        .footer {
            background: #020617;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .footer:hover {
            background: #111;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="http://127.0.0.1:5500/portfolio/html/landpage.html">Portfolio</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="projects" class="py-5">
        <div class="container">
            <h2 class="text-center section-title">My Projects</h2>
            <div class="row g-4">

                <div class="col-md-4">
                    <a href="http://127.0.0.1:5500/moviesite/html/landingpage.html"
                        style="text-decoration: none; color: inherit;">
                        <div class="card">
                            <img src="../img/p1.png" class="card-img-top">
                            <div class="card-body">
                                <h5 class="card-title">Project 1</h5>
                                <p class="card-text">This website help user to find their masala movie in one site</p>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-md-4">
                    <a href="http://127.0.0.1:5500/websitenew/htmlfile/landingpage.html"
                        style="text-decoration: none; color: inherit;">
                        <div class="card">
                            <img src="../img/p2.png" class="card-img-top">
                            <div class="card-body">
                                <h5 class="card-title">Project 2</h5>
                                <p class="card-text">This website is about one photo studio</p>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-md-4">
                    <a href="http://127.0.0.1:5500/website/indexhtml/landingpage.html"
                        style="text-decoration: none; color: inherit;">
                        <div class="card">
                            <img src="../img/p3.png" class="card-img-top">
                            <div class="card-body">
                                <h5 class="card-title">Project 3</h5>
                                <p class="card-text">This is portfolio but its not complete</p>
                            </div>
                        </div>
                    </a>
                </div>

            </div>
        </div>
    </section>

    <section id="contact" class="py-5">
        <div class="container">
            <h2 class="text-center section-title">Contact Me</h2>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <form>
                        <input type="text" class="form-control mb-3" placeholder="Your Name">
                        <input type="email" class="form-control mb-3" placeholder="Your Email">
                        <textarea class="form-control mb-3" rows="4" placeholder="Message"></textarea>
                        <button class="btn btn-primary w-100">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div class="footer">
        <p>© 2026 My Portfolio | All Rights Reserved</p>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>

</body>

</html>
